<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription</title>



<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet" href="../css/auth.css">



</head>



<body>





<div class="auth-container">





<div class="auth-card">



<div class="auth-logo">

<img src="../assets/logo.png">



<h1>
MINI COMMANDE
</h1>

<p>
SAMINA
</p>



</div>







<h2>
Créer un compte
</h2>







<form id="registerForm">



<div class="input-box">

<label>Nom complet</label>

<input
type="text"
id="name"
placeholder="Nom"
required>

</div>







<div class="input-box">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Email"
required>



</div>









<div class="input-box">



<label>Téléphone</label>

<input
type="text"
id="phone"
placeholder="Téléphone"
required>



</div>









<div class="input-box">



<label>Mot de passe</label>

<input
type="password"
id="password"
placeholder="Mot de passe"
required>



</div>







<button>

Créer mon compte

</button>









<p class="switch">

Déjà un compte ?

<a href="login.html">
Connexion
</a>



</p>





</form>





</div>





</div>







<script src="../js/auth.js"></script>



</body>

</html>
