<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Commandes - Samina</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
        <div class="sidebar-menu-wrapper">
            <div class="logo-box">
                <img src="../assets/logo.png" width="45" alt="Logo">
                <div>
                    <h1>MINI COMMANDE</h1>
                    <p>SAMINA</p>
                </div>
            </div>

            <ul>
                <li>
                    <a href="../dashboard.html">🏠 Dashboard</a>
                </li>
                <li>
                    <a href="produits.html">📦 Produits</a>
                </li>
                <li>
                    <a href="membres.html">👥 Membres</a>
                </li>
                <li>
                    <a href="commandes.html">🛒 Commandes</a>
                </li>
                <li>
                    <a href="nouvelle-commande.html">➕ Nouvelle commande</a>
                </li>
                
                <li>
                    <a href="profil.html">👤 Profil</a>
                </li>
            </ul>
        </div>

        <div class="sidebar-profile" style="cursor: pointer;" onclick="window.location.href='profil.html'">
            <div class="profile-avatar">-</div>
            <div class="profile-info">
                <span class="profile-name" id="sidebarUserName">Admin</span>
                <span class="profile-role">Administrateur</span>
            </div>
        </div>
    </aside>

    <!-- ================= CONTENT ================= -->
    <main class="main-content">
        <div class="top-bar">
            <h2>Historique des Commandes</h2>
            <a href="nouvelle-commande.html"><button>➕ Nouvelle commande</button></a>
        </div>

        <section class="table-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Rechercher par client ou produit...">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Produits</th>
                        <th>Quantité</th>
                        <th>Prix Initial</th>
                        <th>Prix Total</th>
                        <th>Reste à Payer</th>
                        <th>Message</th>
                        <th>Date & Heure</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="historiqueCommandeTable">
                    <!-- Généré dynamiquement -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Thème flottant -->
    <select id="mode1">
        <option value="clair">☀️ Clair</option>
        <option value="sombre">🌙 Sombre</option>
    </select>

    <script src="../js/session.js"></script>
    <script src="../theme.js"></script>
    <script src="../js/commande.js"></script>
</body>

</html>
